      - paragraph [ref=e319]: OIDCを使うポイントは2つ。
      - list [ref=e320]:
        - listitem [ref=e321]:
          - code [ref=e322]: "`permissions`"
          - text: に
          - code [ref=e323]: "`id-token: write`"
          - text: を必ず追加する
        - listitem [ref=e324]:
          - code [ref=e325]: "`configure-aws-credentials`"
          - text: で
          - code [ref=e326]: "`role-to-assume`"
          - text: を指定する
      - paragraph [ref=e327]: この2つが揃わないと認証に失敗する。最初はここで詰まった。

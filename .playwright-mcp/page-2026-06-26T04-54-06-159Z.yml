      - heading "OIDCのパーミッション設定漏れ" [level=3] [ref=e331]:
        - link "OIDCのパーミッション設定漏れ" [ref=e332] [cursor=pointer]:
          - /url: "#oidcのパーミッション設定漏れ"
      - paragraph [ref=e333]:
        - text: 最初、
        - code [ref=e334]: "`permissions`"
        - text: ブロックを書いていなかった。
      - paragraph [ref=e335]:
        - text: エラーメッセージは
        - code [ref=e336]: "`Error: Credentials could not be loaded`"
        - text: 。最初は原因が分からなかったが、
        - code [ref=e337]: "`id-token: write`"
        - text: がないとGitHub ActionsがOIDCトークンを発行できないことが分かった。
      - heading "CloudFront Functionが有効化されていなかった問題" [level=3] [ref=e338]:
        - link "CloudFront Functionが有効化されていなかった問題" [ref=e339] [cursor=pointer]:
          - /url: "#cloudfront-functionが有効化されていなかった問題"
      - paragraph [ref=e340]: これが一番時間を使った。
      - paragraph [ref=e341]:
        - code [ref=e342]: "`terraform apply`"
        - text: したのに動かない。GitHub Actionsは成功しているのに個別記事だけ403になる。CloudFrontのキャッシュかと思って無効化しても直らない。S3のバケットポリシーを疑っても直らない。
      - paragraph [ref=e343]:
        - text: JSファイルは存在する。Terraformのコードにも
        - code [ref=e344]: "`aws_cloudfront_function`"
        - text: リソースは定義されている。
      - paragraph [ref=e345]:
        - text: でも、
        - strong [ref=e346]: AWS上にFunctionが作成されていなかった。
      - paragraph [ref=e347]:
        - text: Terraformのコード上では定義していたつもりだったが、実際には
        - code [ref=e348]: "`terraform apply`"
        - text: が正しく実行されておらず、AWS上にFunctionが存在しない状態だった。当然DistributionへのAssociationも行われていない。だからリクエストがFunctionを通らず、URLの書き換えが発生しないまま403を返し続けていた。
      - paragraph [ref=e349]:
        - code [ref=e350]: "`terraform plan`"
        - text: で改めて確認すると、Functionが
        - code [ref=e351]: "`create`"
        - text: されていないことが分かった。
        - code [ref=e352]: "`terraform apply`"
        - text: を正しく実行し直してFunctionを作成、Distributionに関連付けることで解消した。
      - paragraph [ref=e353]:
        - text: 修正は
        - code [ref=e354]: "`function_association`"
        - text: ブロックを正しく書き直すだけだった。でも原因特定に半日かかった。この話は次の記事で詳しく書く。
      - paragraph [ref=e355]: なお、この構成は記事③で紹介したClaude CodeのPlanner・Generator・Evaluatorチームと一緒に構築した。私自身は要件整理・レビュー・検証・トラブルシューティングを担当した。CloudFront Functionの問題のように「何が起きているか分からない」局面では、EvaluatorにTerraformの差分を読ませて原因を絞り込んだ。全部を自分で理解しながら進めたわけではないが、実際に動く環境を作り、エラーを解消し、本番公開までたどり着いた経験は大きな学びになった。
      - separator [ref=e356]
      - heading "やってみて分かったこと" [level=2] [ref=e357]:
        - link "やってみて分かったこと" [ref=e358] [cursor=pointer]:
          - /url: "#やってみて分かったこと"
      - paragraph [ref=e359]: TerraformとGitHub Actionsを組み合わせると、インフラの状態がコードで管理できる。
      - paragraph [ref=e360]: 「なんとなく動いている」状態から、「なぜ動いているか分かる」状態になった。
      - paragraph [ref=e361]: それは介護記録に似ていると思った。口頭で申し送りをするより、記録に残す方が、あとで読んだ人が状態を理解できる。インフラもコードに残すことで、未来の自分が読み返せる。
      - paragraph [ref=e362]: CloudFrontの403エラーで半日溶かした話は、次の記事に書く。
